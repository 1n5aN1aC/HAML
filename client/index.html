<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>HAML</title>
    <script>
      // Apply the saved theme before React mounts so there's no flash of the default palette.
      // Mirrored by App.jsx's theme state. Unknown/retired ids (e.g. the old
      // "current") fall back to Light — required: the theme CSS has no :root
      // fallback, so an invalid data-theme would render with no colors at all.
      var savedTheme = localStorage.getItem('haml-theme')
      var validThemes = ['light', 'dark', 'blue', 'sepia']
      document.documentElement.dataset.theme =
        validThemes.indexOf(savedTheme) !== -1 ? savedTheme : 'light'
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
