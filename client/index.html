<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>HAML</title>
    <script>
      // Apply the saved theme before React mounts so there's no flash of the default palette.
      // Theme list is auto-discovered in themes.js, so we don't validate it here.
      document.documentElement.dataset.theme = localStorage.getItem('haml-theme') || 'light'
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
